<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prospección — WebImpulsa</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; color: #0c1c42; }
  .top-bar { background: #1e293b; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 14px; }
  .top-bar a { color: #93c5fd; text-decoration: none; font-weight: 700; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
  h1 { font-size: 1.3rem; }
  .funnel { display: grid; gap: 8px; margin-top: 18px; }
  .stage { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid #e2e8f0;
    border-radius: 10px; padding: 10px 14px; }
  .stage .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .stage .label { flex: 1; font-weight: 700; font-size: .9rem; }
  .stage .count { font-weight: 900; font-size: 1.1rem; }
  .total { color: #5a6d8c; margin-top: 4px; font-size: .9rem; }
</style>
</head>
<body>
  <div class="top-bar"><strong>📊 Prospección</strong><a href="/panel/prospeccion/mapa/">Mapa →</a></div>
  <div class="wrap">
    <h1>Embudo de prospección</h1>
    <div class="total">{{ total }} empresas en total</div>
    <div class="funnel">
      {% for stage in funnel %}
        <div class="stage">
          <span class="dot" style="background:{{ stage.color }}"></span>
          <span class="label">{{ stage.label }}</span>
          <span class="count">{{ stage.count }}</span>
        </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
